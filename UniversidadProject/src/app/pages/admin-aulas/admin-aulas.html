<div class="container-fluid m-0 pt-4" style="background-color: #121212; min-height: 100vh;">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-light"><i class="bi bi-door-open-fill text-primary"></i> Gestión de Aulas</h2>
            <div class="d-flex gap-2">
                <button class="btn btn-primary shadow-sm" (click)="abrirModalGuardar()">
                    <i class="bi bi-plus-lg"></i> Nueva Aula
                </button>
                <button routerLink="/" class="btn btn-outline-light">
                    <i class="bi bi-arrow-left"></i> Home
                </button>
            </div>
        </div>

        <div class="row">
            @for (aula of aulas; track aula.aulaId) {
            <div class="col-md-4 col-sm-6 mb-4">
                <div class="card shadow-sm h-100 border-0">
                    <div class="card-body text-center">
                        <div class="mb-3">
                            <i class="bi bi-building text-info" style="font-size: 2.5rem;"></i>
                        </div>
                        
                        <h5 class="card-title fw-bold text-uppercase text-light">{{ aula.codigoAula }}</h5>
                        
                        <div class="my-3">
                            <span class="display-6 d-block text-primary fw-bold">{{ aula.capacidad }}</span>
                            <small class="text-muted text-uppercase">Capacidad de alumnos</small>
                        </div>

                        <div class="mb-3">
                            <span class="badge" [ngClass]="aula.activo ? 'bg-success text-light' : 'bg-danger text-light'">
                                {{ aula.activo ? 'Disponible' : 'No Disponible' }}
                            </span>
                        </div>

                        <p class="card-text">
                            <small class="text-muted">
                                Creada: {{ aula.fechaCreacion | date:'dd/MM/yyyy' }}
                            </small>
                        </p>
                    </div>

                    <div class="card-footer bg-transparent border-0 d-flex justify-content-around pb-4">
                        <button class="btn btn-outline-primary btn-sm w-100 me-2" (click)="cargarParaActualizar(aula)">
                            <i class="bi bi-pencil-square"></i> Editar
                        </button>
                        <button class="btn btn-outline-danger btn-sm w-100" (click)="inactivarAula(aula.aulaId)">
                            <i class="bi bi-trash"></i> Inactivar
                        </button>
                    </div>
                </div>
            </div>
            } @empty {
            <div class="col-12">
                <div class="alert alert-secondary text-center shadow-sm border-0 py-5">
                    <i class="bi bi-info-circle fs-2 d-block mb-2"></i> No hay aulas registradas.
                </div>
            </div>
            }
        </div>
    </div>
</div>

<div class="modal fade" id="modalAulas" tabindex="-1" aria-labelledby="modalAulasLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-secondary">
                <h5 class="modal-title text-light" id="modalAulasLabel">
                    <i class="bi bi-pencil-square me-2 text-primary"></i>{{ accionModal }} Aula
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-light">Código del Aula</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-light"><i class="bi bi-hash"></i></span>
                            <input type="text" class="form-control" name="codigoAula" [(ngModel)]="codigoAula" placeholder="Ej: 101">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-light">Capacidad Máxima</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-light"><i class="bi bi-people"></i></span>
                            <input type="number" class="form-control" name="capacidad" [(ngModel)]="capacidad" min="1">
                        </div>
                    </div>
                    <div class="form-check form-switch mb-3">
                        <input type="checkbox" class="form-check-input" id="activoAula" name="activo" [(ngModel)]="activo">
                        <label class="form-check-label text-light" for="activoAula">Estado Activo</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" class="btn btn-primary" (click)="guardarAula()">
                    <i class="bi bi-save me-1"></i> {{ accionModal }} aula
                </button>
            </div>
        </div>
    </div>
</div>
